name: Build doxtr/reactor-builder-assets image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      use_self_hosted:
        description: 'Run on self-hosted infrastructure?'
        type: boolean
        default: true

env:
  IMAGE_NAME: doxtr/reactor-builder-assets

permissions:
  contents: read
  packages: write

jobs:
  # 1. Build simultaneously, but serialize the push step
  build-and-push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/arm64
            arch: arm64
            github_hosted_label: ubuntu-24.04-arm
            self_hosted_label: self-hosted-arm64
          - platform: linux/amd64
            arch: amd64
            github_hosted_label: ubuntu-24.04
            self_hosted_label: self-hosted-amd64
            
    runs-on: ${{ (inputs.use_self_hosted == true || vars.USE_SELF_HOSTED == 'true') && matrix.self_hosted_label || matrix.github_hosted_label }}
    timeout-minutes: 1200
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Both runners compile heavy tasks simultaneously
      - name: Build Arch-Specific Image Locally
        run: |
          docker build --platform ${{ matrix.platform }} -t ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }} .

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step A: Wait for the lock (Ensures only one runner proceeds past this point)
      - name: Wait for upload lock
        uses: softprops/turnstyle@v2
        with:
          abort-after-config-check: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step B: Securely push knowing the image exists locally and bandwidth is clear
      - name: Push Image to DockerHub
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest-${{ matrix.arch }}

  # 2. Final Step: Merges the manifests, applies 'latest' and version tags (e.g., v0.0.1)
  merge:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Stitch Manifest List and Push
        run: |
          TAGS=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          
          docker buildx imagetools create $TAGS \
            ${{ env.IMAGE_NAME }}:latest-amd64 \
            ${{ env.IMAGE_NAME }}:latest-arm64